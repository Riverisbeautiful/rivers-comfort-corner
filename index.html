<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>For River</title>
</head>
<body>
    <div id="app">
        <h1>Hey River, how are you feeling?</h1>
        <p class="subtitle">You are loved, heard, and appreciated. Feel free to share a highlight, a worry, or just say hello.</p>
        
        <textarea id="riverNote" placeholder="Write something..."></textarea>
        <button id="sendBtn">Send with Love</button>
        
        <div class="interactive-section">
            <button id="hugBtn">Send a Digital Hug</button>
            <button id="gameBtn">Get a Sweet Reminder</button>
            <p id="gameOutput" style="margin-top: 15px; font-weight: bold; color: #d680a1;"></p>
        </div>
    </div>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
